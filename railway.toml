[build]
builder = "nixpacks"
buildCommand = "npm install --prefer-offline && npm run build --workspace=apps/api && npx prisma generate --schema=apps/api/prisma/schema.prisma"

[deploy]
startCommand = "npm run start:prod --workspace=apps/api"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
